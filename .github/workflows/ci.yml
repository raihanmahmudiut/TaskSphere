name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: Lint API
        run: pnpm --filter @tasksphere/api lint

      - name: Lint Web
        run: pnpm --filter web lint

      - name: Typecheck API
        run: pnpm --filter @tasksphere/api typecheck

      - name: Typecheck Web
        run: pnpm --filter web typecheck

      - name: Build
        run: pnpm build
